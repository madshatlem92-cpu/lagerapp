<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Varetelling</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  font-size: 16px;
}

button {
  background: #0078D4;
  color: white;
  border: none;
  border-radius: 8px;
}

.item {
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  background: white;
}
</style>

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<h2>📦 Varetelling</h2>

<button onclick="startScanner()">📷 Start scanning</button>
<div id="reader" style="width:100%; margin-top:10px;"></div>

<input id="barcode" placeholder="Strekkode">
<input id="name" placeholder="Navn på vare">

<select id="unit">
  <option value="stk">stk</option>
  <option value="kg">kg</option>
  <option value="rull">rull</option>
  <option value="krt">kartong (krt)</option>
</select>

<input id="amount" type="number" step="0.01" placeholder="Antall">

<button onclick="addItem()">Registrer</button>

<input id="search" placeholder="🔍 Søk..." oninput="render()">

<button onclick="exportToExcel()">📊 Last ned Excel</button>
<button onclick="clearAll()">🗑 Tøm lager</button>

<h3>Lager:</h3>
<div id="list"></div>

<script>

const barcode = document.getElementById("barcode");
const name = document.getElementById("name");
const unit = document.getElementById("unit");
const amount = document.getElementById("amount");
const list = document.getElementById("list");

let inventory = JSON.parse(localStorage.getItem("inv") || "{}");

function save() {
  localStorage.setItem("inv", JSON.stringify(inventory));
}

// Autofyll
barcode.addEventListener("input", function() {
  let b = barcode.value;
  if (inventory[b]) {
    name.value = inventory[b].name;
    unit.value = inventory[b].unit;
  }
});

// Registrer vare
function addItem() {
  let b = barcode.value.trim();
  let n = name.value.trim();
  let u = unit.value;
  let a = parseFloat(amount.value) || 1;

  if (!b) {
    alert("Scan eller skriv strekkode");
    return;
  }

  if (!inventory[b]) {
    inventory[b] = {
      name: n || "Ukjent",
      unit: u,
      stock: 0
    };
  }

  inventory[b].stock += a;

  save();
  render();

  barcode.value = "";
  name.value = "";
  amount.value = "";

  barcode.focus();
}

// Vis lager
function render() {
  let search = document.getElementById("search").value.toLowerCase();
  list.innerHTML = "";

  let items = Object.entries(inventory);
  items.sort((a,b)=> a[1].name.localeCompare(b[1].name));

  for (let [k, i] of items) {
    if (
      i.name.toLowerCase().includes(search) ||
      k.includes(search) ||
      i.unit.toLowerCase().includes(search)
    ) {

      let style = i.stock < 5
        ? "background:#ffe5e5; border-left:5px solid red;"
        : "background:white;";

      list.innerHTML += `
        <div class="item" style="${style}">
          <b style="font-size:18px;">${i.name}</b><br>
          <span style="color:gray;">${k}</span><br><br>

          <span style="font-size:22px; font-weight:bold;">
            ${i.stock} ${i.unit}
          </span>

          <br><br>

          <button onclick="quickAdd('${k}')">+1</button>
          <button onclick="removeOne('${k}')">➖</button>
          <button onclick="removeItem('${k}')">❌</button>
        </div>
      `;
    }
  }
}

// +1
function quickAdd(code) {
  inventory[code].stock += 1;
  save();
  render();
}

// trekk fra
function removeOne(code) {
  if (inventory[code].stock > 1) {
    inventory[code].stock -= 1;
  } else {
    delete inventory[code];
  }

  save();
  render();
}

// slett
function removeItem(code) {
  if (confirm("Slette varen?")) {
    delete inventory[code];
    save();
    render();
  }
}

// tøm alt
function clearAll() {
  if (confirm("Slette ALT lager?")) {
    inventory = {};
    save();
    render();
  }
}

// Excel eksport
function exportToExcel() {
  let date = new Date().toISOString().split("T")[0];

  let csv = "Strekkode;Navn;Antall;Enhet\n";

  for (let code in inventory) {
    let item = inventory[code];
    csv += `${code};${item.name};${item.stock};${item.unit}\n`;
  }

  let blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  let url = URL.createObjectURL(blob);

  let link = document.createElement("a");
  link.href = url;
  link.download = "lager_" + date + ".csv";
  link.click();
}

// scanner
function startScanner() {
  const reader = document.getElementById("reader");
  reader.innerHTML = "";

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      barcode.value = decodedText;
      html5QrCode.stop();
      amount.focus();
    }
  ).catch(err => {
    alert("Scanner feil: " + err);
  });
}

// enter = registrer
amount.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    addItem();
  }
});

// start
render();

</script>

</body>
</html>
